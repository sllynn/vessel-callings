resources:
  jobs:
    position_index:
      name: "[marineintel-demo] 30 position index (streaming)"
      description: |
        Continuous streaming pipeline: Auto Loader from landing volume into
        bronze_ais_positions, then enrich into silver_positions with
        h3_longlatash3 at position_res. Two concurrent streams, both on
        processingTime=trigger_seconds. Cancel the run to stop both.
      tasks:
        - task_key: index_positions
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ../../notebooks/20_positions/index_positions.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              position_res: ${var.position_res}
              trigger_seconds: "30"
              reset_state: ${var.reset_state}
