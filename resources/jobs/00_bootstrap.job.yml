resources:
  jobs:
    bootstrap:
      name: "[marineintel-demo] 00 bootstrap"
      description: |
        One-shot setup: copy raw shape parquet files from local data/ into
        the landing volume, create the unified shapes_raw table, ingest the
        three sources via ST_GeomFromWKB into GEOMETRY(4326).
      tasks:
        - task_key: copy_shape_files
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ../../notebooks/00_setup/copy_shape_files.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
              workspace_files_path: ${workspace.file_path}

        - task_key: ingest_shapes
          depends_on:
            - task_key: copy_shape_files
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ../../notebooks/10_shapes/load_shapes.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume: ${var.volume}
